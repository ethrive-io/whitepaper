# SPDX-License-Identifier: Apache-2.0
# PR tier — markdown smoke. PDF generation lands in release.yml as
# a follow-up (per WS-0005 § "Whitepaper PDF generation").
#
# whitepaper is the org's ONLY public repo, so it CANNOT call the private
# ethrive-io/workspace reusable workflows (GitHub blocks public->private
# reusable calls). The shared changes-detect path-filter + the
# no-registry-publish-lint don't apply to a docs repo anyway (no build,
# nothing published to a package registry), so the cheap markdown smoke
# just runs self-contained here.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Markdown smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            head -1 "$f" >/dev/null 2>&1 || { echo "::error file=$f::not readable"; fail=1; }
          done < <(find . -name '*.md' -not -path './.git/*')
          exit $fail
